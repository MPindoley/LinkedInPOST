<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Desk · Content Studio</title>
    <style>
      html, body, #root { height: 100%; margin: 0; background: #0E1117; }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- App source, kept inert until we compile it with the classic JSX runtime -->
    <script type="text/plain" id="app-source">
const { useState, useRef, useEffect, useMemo } = React;


// ---------------------------------------------------------------------------
// THE DESK. A LinkedIn content studio for a wealth-management advisor.
// Pick a pillar, set the length, generate a compliant post + a minimalist
// image carousel. No em dashes. Attach the disclaimer, run the checklist,
// copy/download, route to back office.
//
// Design system: editorial. Newsreader (serif display) + Inter Tight (sans
// body) + IBM Plex Mono (labels). Every slide shares one type system, one
// restrained palette, and one brand footer so the carousel reads as a single
// authored piece and visibly belongs to its post.
// ---------------------------------------------------------------------------

const PILLARS = [
  { id: "fact", label: "Fact → Lesson", tag: "DYK",
    blurb: "A surprising world fact, bridged to a money principle.",
    directive: "Open with ONE genuinely surprising, verifiable real-world fact (science, history, nature, geography). Then bridge it naturally to a single wealth-management principle. The fact should feel fun and unexpected; the bridge should feel earned, not forced." },
  { id: "myth", label: "Myth vs. Fact", tag: "MYTH",
    blurb: "Kill one common money misconception, fast.",
    directive: "State a common money MYTH plainly, then correct it with the reality and a short explanation of why the myth persists. Keep it punchy and non-preachy." },
  { id: "concept", label: "Concept Demystified", tag: "101",
    blurb: "One term, explained like a smart friend would.",
    directive: "Take ONE financial-planning concept and explain it in plain language with a simple analogy. No jargon without immediately defining it. Make the reader feel smarter, not lectured." },
  { id: "behavior", label: "Behavioral Finance", tag: "MIND",
    blurb: "A bias people fall for, and how to catch it.",
    directive: "Name ONE behavioral-finance bias or money-psychology pattern. Describe how it quietly costs people, then how to notice and counter it. Empathetic, not judgmental." },
  { id: "think", label: "Make Them Think", tag: "ASK",
    blurb: "A question post built purely for engagement.",
    directive: "Build the post around ONE thought-provoking question about money, values, or the future. Offer a short framing, then invite the reader to reflect or comment. Low on claims, high on curiosity." },
  { id: "holiday", label: "Holiday / Seasonal", tag: "CAL",
    blurb: "A seasonal hook into a planning theme.",
    directive: "Tie the post to a holiday, season, or calendar moment (use the topic field if provided, otherwise pick a fitting one). Use the occasion as a warm hook into a relevant planning theme." },
];

const TONES = ["Educator", "Conversational", "Bold but careful"];
const LEN_LABELS = ["Short", "Standard", "Long", "Max"];
const LEN_WORDS = [80, 150, 230, 300];

// OpenAI only. Pick the model used for drafting. gpt-4o-mini is fast and cheap;
// gpt-4o is higher quality. You can add any chat model id your key can access.
const OPENAI_ENDPOINT = "https://api.openai.com/v1/chat/completions";
const OPENAI_MODELS = [
  { id: "gpt-4o-mini", label: "4o mini" },
  { id: "gpt-4o", label: "4o" },
];

// Three restrained palettes. One palette runs across the whole carousel so the
// set looks authored, not auto-generated. Each defines a calm cover/close
// variant so slides 1 and 5 frame the set without breaking cohesion.
const THEMES = {
  ivory: {
    name: "Ivory",
    bg: "#F3F0E9", ink: "#1B1A17", sub: "#6E695E", accent: "#9C7C44",
    line: "#DDD6C7", chipInk: "#F3F0E9",
    coverBg: "#1A1916", coverInk: "#F4F1EA", coverSub: "#A9A294",
  },
  ink: {
    name: "Ink",
    bg: "#14171D", ink: "#F1EEE7", sub: "#929AA6", accent: "#C7A266",
    line: "#2A303A", chipInk: "#14171D",
    coverBg: "#0E1116", coverInk: "#F4F1EA", coverSub: "#8A93A0",
  },
  slate: {
    name: "Slate",
    bg: "#E8EBEC", ink: "#15222B", sub: "#5C6A72", accent: "#2F6B62",
    line: "#D0D5D7", chipInk: "#E8EBEC",
    coverBg: "#13242C", coverInk: "#EEF1F1", coverSub: "#8FA1A6",
  },
};

const DEFAULT_DISCLAIMER =
  "Educational content only, not individualized financial, tax, or legal advice. Consult a qualified professional about your own situation.";

const STATIC_CHECKS = [
  "No specific performance figures or promised returns",
  "No client testimonials or endorsements",
  "No predictions stated as certainty (\"will\" softened to \"may\")",
  "Framed as education, not a recommendation",
  "Approved disclaimer attached",
  "Copy archived for recordkeeping",
];

// Type system, shared by canvas + CSS.
const SERIF = '"Newsreader", Georgia, serif';
const SANS = '"Inter Tight", system-ui, sans-serif';
const MONO = '"IBM Plex Mono", ui-monospace, monospace';

// Strip em/en dashes anywhere they slip through.
function deDash(s) {
  if (!s) return s;
  return String(s)
    .replace(/\s*[—–]\s*/g, ", ")
    .replace(/,\s*,/g, ",")
    .replace(/\s+,/g, ",")
    .replace(/,\s*\./g, ".")
    .replace(/,\s*$/g, "");
}

function cleanResult(r) {
  const c = { ...r };
  c.hook = deDash(c.hook);
  c.body = deDash(c.body);
  if (Array.isArray(c.carousel)) {
    c.carousel = c.carousel.map((s) => ({
      ...s,
      title: deDash(s.title),
      summary: deDash(s.summary),
      headline: deDash(s.headline),
      sub: deDash(s.sub),
    }));
  }
  if (Array.isArray(c.reviewer_notes)) c.reviewer_notes = c.reviewer_notes.map(deDash);
  return c;
}

function buildSystemPrompt(pillar, tone, words, lenLabel) {
  return `You are a ghostwriter creating LinkedIn posts for a wealth-management financial advisor in the United States. Your output must be SUBMITTABLE to a broker-dealer / RIA compliance review with minimal edits.

NON-NEGOTIABLE COMPLIANCE RULES (spirit of SEC Marketing Rule 206(4)-1 and FINRA Rule 2210):
- Educational and general only. Never give individualized advice or recommend a specific security, product, or action.
- NO specific past performance figures, return percentages, or any promise/implication of future results.
- NO predictions stated as certainty. Prefer "may", "can", "often" over "will".
- NO testimonials, endorsements, or client stories presented as proof.
- NO superlatives or unverifiable claims ("best", "guaranteed", "the only", "risk-free").
- NO fear-mongering or pressure. Balanced and fair.
- Any real-world fact you cite must be accurate and verifiable; if unsure, choose a different fact.

STRICT STYLE RULE: Do NOT use em dashes or en dashes anywhere in your output. Use commas, periods, or restructure the sentence instead. This rule is absolute.

VOICE: First person, warm, ${tone}. Confident but humble. Concise. Written for an intelligent general audience, not for advisors.

LENGTH: The text post must be at most about ${words} words (${lenLabel}). Treat this as a ceiling, never pad toward it. Be as concise as the idea allows.

POST TYPE FOR THIS REQUEST: ${pillar.label}. ${pillar.directive}

You will produce TWO formats of the SAME idea:
1) A single LinkedIn text post: a strong scroll-stopping hook line, then short body lines/paragraphs, ending with a soft, non-promotional invitation to reflect or reach out. No hashtags in the body. This caption is where the depth lives, so it can carry the full thought within the length ceiling.
2) A MINIMALIST image carousel of 5 slides. The slides are visual and sparse, not paragraphs. Each slide carries very few words so it reads in one glance. Slide 1 is the COVER: a short bold title plus a one-line summary of what the carousel delivers. Slides 2-4 each carry ONE short headline (max about 8 words) plus an optional one-line subtext (max about 12 words). Slide 5 is a soft closing line. The reader swipes the minimal slides, then reads the full post caption for more. Keep slide text TIGHT: short headlines read better in a large serif and look more professional.

Return ONLY valid JSON, no markdown, no code fences, in exactly this shape:
{
  "hook": "the opening line of the text post",
  "body": "the rest of the text post, newline-separated, no hashtags",
  "hashtags": ["#Tag", "#Tag", "#Tag", "#Tag"],
  "carousel": [
    {"kind": "cover", "title": "...", "summary": "..."},
    {"headline": "...", "sub": "..."},
    {"headline": "...", "sub": "..."},
    {"headline": "...", "sub": "..."},
    {"kind": "close", "title": "...", "sub": "..."}
  ],
  "reviewer_notes": ["one thing the compliance reviewer should double-check", "another"]
}
Keep hashtags to 4 relevant, non-spammy tags. Keep reviewer_notes to 2 short items specific to THIS post. Remember: no em dashes anywhere.`;
}

// ---- Canvas slide rendering -------------------------------------------------
function wrap(ctx, text, maxW) {
  const words = String(text || "").split(/\s+/);
  const lines = [];
  let line = "";
  for (const w of words) {
    const t = line ? line + " " + w : w;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = w; }
    else line = t;
  }
  if (line) lines.push(line);
  return lines;
}

// Shrink the headline until it fits a sane number of lines. Keeps long and
// short slides looking balanced instead of one giant block of text.
function fitText(ctx, text, maxW, font, startSize, minSize, maxLines) {
  let size = startSize;
  let lines = [];
  while (size >= minSize) {
    ctx.font = font.replace("__SIZE__", size + "px");
    lines = wrap(ctx, text, maxW);
    if (lines.length <= maxLines) return { size, lines };
    size -= 4;
  }
  ctx.font = font.replace("__SIZE__", minSize + "px");
  return { size: minSize, lines: wrap(ctx, text, maxW) };
}

function setTracking(ctx, v) {
  try { ctx.letterSpacing = v; } catch (e) {}
}

function drawSlide(canvas, slide, i, total, opts) {
  const { theme, kicker, brand } = opts;
  const W = 1080, H = 1350, PAD = 104;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  const kind = slide.kind;
  const isFrame = kind === "cover" || kind === "close";

  const bg = isFrame ? theme.coverBg : theme.bg;
  const ink = isFrame ? theme.coverInk : theme.ink;
  const sub = isFrame ? theme.coverSub : theme.sub;
  const line = isFrame ? "rgba(255,255,255,0.14)" : theme.line;
  const accent = theme.accent;

  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  ctx.textBaseline = "alphabetic";

  // --- Header: kicker (left) + index (right). One thin accent rule below. ----
  const headY = PAD + 26;
  ctx.fillStyle = accent;
  ctx.font = "500 26px " + MONO;
  setTracking(ctx, "4px");
  if (kind === "cover") {
    // Cover gets a filled accent chip so slide 1 reads as the opener.
    const label = kicker;
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = accent;
    const chipH = 52, chipPadX = 22;
    roundRect(ctx, PAD, headY - 36, tw + chipPadX * 2, chipH, 8);
    ctx.fill();
    ctx.fillStyle = theme.chipInk;
    ctx.fillText(label, PAD + chipPadX, headY);
  } else {
    ctx.fillText(kicker, PAD, headY);
  }
  setTracking(ctx, "2px");
  ctx.fillStyle = sub;
  ctx.font = "500 26px " + MONO;
  const idx = String(i + 1).padStart(2, "0") + " / " + String(total).padStart(2, "0");
  ctx.textAlign = "right";
  ctx.fillText(idx, W - PAD, headY);
  ctx.textAlign = "left";
  setTracking(ctx, "0px");

  ctx.strokeStyle = line; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(PAD, headY + 34); ctx.lineTo(W - PAD, headY + 34); ctx.stroke();

  // --- Footer region: hairline rule, brand byline, progress segments. --------
  const ruleY = H - 232;
  ctx.strokeStyle = line; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(PAD, ruleY); ctx.lineTo(W - PAD, ruleY); ctx.stroke();

  // Brand byline, identical on every slide -> ties the set together and to the post.
  ctx.fillStyle = ink;
  ctx.font = "600 30px " + SANS;
  ctx.fillText(brand.name, PAD, ruleY + 50);
  ctx.fillStyle = sub;
  ctx.font = "400 26px " + SANS;
  ctx.fillText(brand.handle, PAD, ruleY + 88);

  // Right side of byline: monogram dot for cover/close, "SWIPE" cue on cover.
  if (kind === "cover") {
    ctx.fillStyle = accent;
    ctx.font = "500 24px " + MONO;
    setTracking(ctx, "3px");
    ctx.textAlign = "right";
    ctx.fillText("SWIPE →", W - PAD, ruleY + 56);
    ctx.textAlign = "left";
    setTracking(ctx, "0px");
  } else {
    ctx.fillStyle = accent;
    ctx.beginPath(); ctx.arc(W - PAD - 6, ruleY + 44, 7, 0, Math.PI * 2); ctx.fill();
  }

  // Progress: N segments, filled through the current slide. Calm and exact.
  const segTop = H - 96;
  const segGap = 9;
  const segW = (W - PAD * 2 - segGap * (total - 1)) / total;
  for (let s = 0; s < total; s++) {
    ctx.fillStyle = s <= i ? accent : line;
    roundRect(ctx, PAD + s * (segW + segGap), segTop, segW, 5, 2.5);
    ctx.fill();
  }

  // --- Main text block, left-aligned, optically centered in the open space. --
  const headline = slide.title || slide.headline || "";
  const subText = slide.summary || slide.sub || "";
  const maxW = W - PAD * 2;

  const hStart = kind === "cover" ? 104 : 88;
  const hFit = fitText(ctx, headline, maxW,
    "500 __SIZE__ " + SERIF, hStart, 52, kind === "cover" ? 4 : 3);
  const hLine = hFit.size * 1.1;

  const subSize = 36;
  ctx.font = "400 " + subSize + "px " + SANS;
  const sLines = subText ? wrap(ctx, subText, maxW) : [];
  const sLine = subSize * 1.4;
  const gap = sLines.length ? 54 : 0;

  const blockH = hFit.lines.length * hLine + gap + sLines.length * sLine;
  const zoneTop = headY + 34;
  const zoneBot = ruleY;
  let y = zoneTop + (zoneBot - zoneTop - blockH) / 2 + hFit.size;

  ctx.fillStyle = ink;
  ctx.font = "500 " + hFit.size + "px " + SERIF;
  hFit.lines.forEach((ln, k) => ctx.fillText(ln, PAD, y + k * hLine));

  if (sLines.length) {
    const sy = y + (hFit.lines.length - 1) * hLine + gap;
    ctx.fillStyle = sub;
    ctx.font = "400 " + subSize + "px " + SANS;
    sLines.forEach((ln, k) => ctx.fillText(ln, PAD, sy + k * sLine));
  }

  // Closing slide: quiet disclaimer line just under the headline block.
  if (kind === "close") {
    ctx.fillStyle = sub;
    ctx.font = "400 22px " + MONO;
    setTracking(ctx, "1px");
    const dy = Math.min(y + blockH + 64, ruleY - 28);
    ctx.fillText("Educational content, not individualized advice.", PAD, dy);
    setTracking(ctx, "0px");
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function downloadCanvas(canvas, name) {
  canvas.toBlob((b) => {
    const u = URL.createObjectURL(b);
    const a = document.createElement("a");
    a.href = u; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(u), 1000);
  }, "image/png");
}

// Small live thumbnail of a slide. Renders the real drawSlide so the strip is
// an exact preview, and clicking it jumps to that slide in the carousel tab.
function SlideThumb({ slide, i, total, opts, ready, active, onClick }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) drawSlide(ref.current, slide, i, total, opts);
  }, [slide, i, total, opts, ready]);
  return (
    <button className={"thumb" + (active ? " on" : "")} onClick={onClick} title={"Slide " + (i + 1)}>
      <canvas ref={ref} />
    </button>
  );
}

// ---- Component --------------------------------------------------------------
function ContentDesk() {
  const [pillarId, setPillarId] = useState("fact");
  const [tone, setTone] = useState("Educator");
  const [lenIdx, setLenIdx] = useState(1);
  const [topic, setTopic] = useState("");
  const [themeId, setThemeId] = useState("ivory");
  const [brandName, setBrandName] = useState("Your Name, CFP®");
  const [brandHandle, setBrandHandle] = useState("@yourhandle");
  const [disclaimer, setDisclaimer] = useState(DEFAULT_DISCLAIMER);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [result, setResult] = useState(null);
  const [view, setView] = useState("post");
  const [slide, setSlide] = useState(0);
  const [copied, setCopied] = useState("");
  const [editDisc, setEditDisc] = useState(false);
  const [fontsReady, setFontsReady] = useState(false);
  const [modelId, setModelId] = useState("gpt-4o-mini");
  const [apiKey, setApiKey] = useState(() => {
    try {
      const stored = localStorage.getItem("openai_api_key");
      if (stored) return stored;
      return "";
    } catch (e) { return ""; }
  });
  const canvasRef = useRef(null);

  function saveKey(v) {
    setApiKey(v);
    try { localStorage.setItem("openai_api_key", v); } catch (e) {}
  }

  const pillar = PILLARS.find((p) => p.id === pillarId);
  const liveTopic = topic.trim();
  const slides = result?.carousel || [];

  const theme = THEMES[themeId];
  const brand = useMemo(
    () => ({ name: brandName.trim() || "Your Name", handle: brandHandle.trim() || "@yourhandle" }),
    [brandName, brandHandle]
  );
  const drawOpts = useMemo(
    () => ({ theme, kicker: pillar.label.toUpperCase(), brand }),
    [theme, pillar.label, brand]
  );

  useEffect(() => {
    let dead = false;
    (async () => {
      try {
        await Promise.all([
          document.fonts.load('500 100px "Newsreader"'),
          document.fonts.load('600 30px "Inter Tight"'),
          document.fonts.load('400 30px "Inter Tight"'),
          document.fonts.load('500 26px "IBM Plex Mono"'),
        ]);
        await document.fonts.ready;
      } catch (e) {}
      if (!dead) setFontsReady(true);
    })();
    return () => { dead = true; };
  }, []);

  useEffect(() => {
    if (view !== "carousel" || !canvasRef.current || !slides[slide]) return;
    drawSlide(canvasRef.current, slides[slide], slide, slides.length, drawOpts);
  }, [view, slide, result, fontsReady, drawOpts]);

  async function generate() {
    if (!apiKey.trim()) {
      setError("Add your OpenAI API key above to generate.");
      return;
    }
    setLoading(true); setError(""); setResult(null); setSlide(0); setView("post");
    try {
      const userMsg = liveTopic
        ? `Topic / angle to use: "${liveTopic}". Generate the ${pillar.label} post and carousel around this.`
        : `No topic given, choose a fresh interesting one yourself. Generate the ${pillar.label} post and carousel.`;
      // OpenAI Chat Completions, called directly from the browser with your key.
      const response = await fetch(OPENAI_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + apiKey.trim(),
        },
        body: JSON.stringify({
          model: modelId,
          temperature: 0.8,
          max_tokens: 1200,
          response_format: { type: "json_object" },
          messages: [
            { role: "system", content: buildSystemPrompt(pillar, tone, LEN_WORDS[lenIdx], LEN_LABELS[lenIdx]) },
            { role: "user", content: userMsg },
          ],
        }),
      });
      if (!response.ok) {
        let detail = "";
        try { detail = (await response.json())?.error?.message || ""; } catch (e) {}
        if (response.status === 401) throw new Error("Your OpenAI API key was rejected (401). Check the key.");
        if (response.status === 429) throw new Error("OpenAI rate limit or quota reached (429). " + detail);
        throw new Error("OpenAI error " + response.status + ". " + detail);
      }
      const data = await response.json();
      const raw = data.choices?.[0]?.message?.content || "";
      const cleaned = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(cleaned.slice(cleaned.indexOf("{"), cleaned.lastIndexOf("}") + 1));
      setResult(cleanResult(parsed));
    } catch (e) {
      setError(e && e.message ? e.message : "That draft didn't come through cleanly. Try Generate again.");
    } finally {
      setLoading(false);
    }
  }

  function fullPostText() {
    if (!result) return "";
    return `${result.hook}\n\n${result.body}\n\n${disclaimer}\n\n` + (result.hashtags || []).join(" ");
  }

  function copy(text, key) {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    setCopied(key); setTimeout(() => setCopied(""), 1600);
  }

  function downloadAll() {
    slides.forEach((s, i) => {
      const c = document.createElement("canvas");
      drawSlide(c, s, i, slides.length, drawOpts);
      setTimeout(() => downloadCanvas(c, `carousel-slide-${i + 1}.png`), i * 280);
    });
  }

  return (
    <div className="desk">
      <style>{css}</style>

      <header className="masthead">
        <div className="mast-left">
          <div className="mast-eyebrow">CONTENT STUDIO &middot; FINANCIAL ADVISOR</div>
          <h1 className="mast-title">The Desk</h1>
        </div>
        <div className="mast-right">
          <span className="mast-meta">NO EM DASHES</span>
          <span className="mast-dot" />
          <span className="mast-meta">COMPLIANCE-AWARE</span>
        </div>
      </header>

      <div className="grid">
        <section className="controls">
          <div className="ctrl-label">OpenAI API key</div>
          <input className="topic" type="password" value={apiKey} autoComplete="off"
            onChange={(e) => saveKey(e.target.value)} placeholder="sk-..." />
          <div className="slider-note">
            {apiKey.trim() ? "Key saved in this browser only." : "Paste your key. Stored in this browser only, sent only to OpenAI."}
          </div>

          <div className="ctrl-label">Model</div>
          <div className="tones">
            {OPENAI_MODELS.map((m) => (
              <button key={m.id} className={"tone" + (m.id === modelId ? " on" : "")} onClick={() => setModelId(m.id)}>{m.label}</button>
            ))}
          </div>

          <div className="ctrl-label">Pillar</div>
          <div className="pillars">
            {PILLARS.map((p) => (
              <button key={p.id} className={"pillar" + (p.id === pillarId ? " on" : "")} onClick={() => setPillarId(p.id)}>
                <span className="pillar-tag">{p.tag}</span>
                <span className="pillar-name">{p.label}</span>
                <span className="pillar-blurb">{p.blurb}</span>
              </button>
            ))}
          </div>

          <div className="ctrl-label">Topic <span className="opt">optional</span></div>
          <input className="topic" value={topic} onChange={(e) => setTopic(e.target.value)}
            placeholder="e.g. octopuses, the Roth deadline, coaching season..." />

          <div className="ctrl-label">Max length</div>
          <input className="slider" type="range" min={0} max={3} step={1} value={lenIdx}
            onChange={(e) => setLenIdx(Number(e.target.value))} />
          <div className="slider-row">
            {LEN_LABELS.map((l, i) => (
              <span key={l} className={"slider-tick" + (i === lenIdx ? " on" : "")}>{l}</span>
            ))}
          </div>
          <div className="slider-note">Up to ~{LEN_WORDS[lenIdx]} words. A ceiling, not a target.</div>

          <div className="ctrl-label">Voice</div>
          <div className="tones">
            {TONES.map((t) => (
              <button key={t} className={"tone" + (t === tone ? " on" : "")} onClick={() => setTone(t)}>{t}</button>
            ))}
          </div>

          <div className="ctrl-label">Carousel theme</div>
          <div className="themes">
            {Object.entries(THEMES).map(([id, t]) => (
              <button key={id} className={"theme-btn" + (id === themeId ? " on" : "")} onClick={() => setThemeId(id)}>
                <span className="sw" style={{ background: t.coverBg }} />
                <span className="sw" style={{ background: t.bg }} />
                <span className="sw" style={{ background: t.accent }} />
                <span className="theme-name">{t.name}</span>
              </button>
            ))}
          </div>

          <div className="ctrl-label">Byline <span className="opt">on every slide</span></div>
          <input className="topic" value={brandName} onChange={(e) => setBrandName(e.target.value)} placeholder="Your Name, CFP" />
          <input className="topic mt8" value={brandHandle} onChange={(e) => setBrandHandle(e.target.value)} placeholder="@yourhandle" />

          <button className="generate" onClick={generate} disabled={loading}>
            {loading ? "Drafting..." : liveTopic ? "Generate draft" : "Surprise me"}
          </button>
          <p className="hint">Generates a post and a matching image carousel together. The byline ties them as one piece. Always route to your back office before publishing.</p>
        </section>

        <section className="output">
          {!result && !loading && !error && (
            <div className="empty">
              <div className="empty-mark">&para;</div>
              <p>Pick a pillar and hit generate. Your draft proof lands here: the post on one tab, downloadable image slides on the other, with a live preview of the carousel right under the post.</p>
            </div>
          )}
          {loading && (<div className="empty"><div className="empty-mark spin">&#9716;</div><p>Setting the type...</p></div>)}
          {error && (<div className="empty err"><div className="empty-mark">!</div><p>{error}</p></div>)}

          {result && (
            <>
              <div className="tabs">
                <button className={"tab" + (view === "post" ? " on" : "")} onClick={() => setView("post")}>Post</button>
                <button className={"tab" + (view === "carousel" ? " on" : "")} onClick={() => setView("carousel")}>Carousel</button>
                <div className="tab-meta">{pillar.tag} &middot; {LEN_LABELS[lenIdx].toUpperCase()} &middot; {theme.name.toUpperCase()}</div>
              </div>

              {view === "post" && (
                <div className="proof">
                  <div className="proof-dateline">DRAFT PROOF &middot; FOR REVIEW</div>
                  <p className="proof-hook">{result.hook}</p>
                  <div className="proof-body">
                    {String(result.body || "").split("\n").filter(Boolean).map((line, i) => (<p key={i}>{line}</p>))}
                  </div>
                  <div className="proof-disc">{disclaimer}</div>
                  <div className="proof-tags">
                    {(result.hashtags || []).map((h, i) => (<span key={i} className="tagchip">{h}</span>))}
                  </div>

                  <div className="proof-byline">
                    <span className="by-name">{brand.name}</span>
                    <span className="by-handle">{brand.handle}</span>
                  </div>

                  {slides.length > 0 && (
                    <div className="proof-carousel">
                      <div className="thumbs-label">CAROUSEL &middot; {slides.length} SLIDES &middot; CLICK TO OPEN</div>
                      <div className="thumbs">
                        {slides.map((s, i) => (
                          <SlideThumb key={i} slide={s} i={i} total={slides.length} opts={drawOpts}
                            ready={fontsReady} active={false}
                            onClick={() => { setView("carousel"); setSlide(i); }} />
                        ))}
                      </div>
                    </div>
                  )}

                  <div className="proof-actions">
                    <button className="act" onClick={() => copy(fullPostText(), "post")}>{copied === "post" ? "Copied ✓" : "Copy post"}</button>
                    <button className="act ghost" onClick={generate}>Regenerate</button>
                  </div>
                </div>
              )}

              {view === "carousel" && (
                <div className="carousel">
                  <div className="slide-stage">
                    <button className="nav" onClick={() => setSlide((s) => Math.max(0, s - 1))} disabled={slide === 0}>&#8249;</button>
                    <canvas ref={canvasRef} className="slide-canvas" />
                    <button className="nav" onClick={() => setSlide((s) => Math.min(slides.length - 1, s + 1))} disabled={slide === slides.length - 1}>&#8250;</button>
                  </div>
                  <div className="dots">
                    {slides.map((_, i) => (<button key={i} className={"dot" + (i === slide ? " on" : "")} onClick={() => setSlide(i)} />))}
                  </div>
                  <div className="proof-actions center">
                    <button className="act" onClick={() => canvasRef.current && downloadCanvas(canvasRef.current, `carousel-slide-${slide + 1}.png`)}>Download this slide</button>
                    <button className="act" onClick={downloadAll}>Download all</button>
                    <button className="act ghost" onClick={generate}>Regenerate</button>
                  </div>
                  <p className="hint center">1080 &times; 1350 PNG slides, ready to upload. The minimal slides pull the swipe; the full read lives in your post caption.</p>
                </div>
              )}

              <div className="compliance">
                <div className="comp-head">
                  <span>Before you submit to back office</span>
                  <button className="disc-edit" onClick={() => setEditDisc((v) => !v)}>{editDisc ? "Done" : "Edit disclaimer"}</button>
                </div>
                {editDisc && (<textarea className="disc-box" value={disclaimer} onChange={(e) => setDisclaimer(e.target.value)} rows={3} />)}
                <ul className="checks">
                  {STATIC_CHECKS.map((c, i) => (<li key={i}><span className="tick">&#10003;</span>{c}</li>))}
                </ul>
                {result.reviewer_notes && result.reviewer_notes.length > 0 && (
                  <div className="flags">
                    <div className="flags-head">Flag for this draft</div>
                    {result.reviewer_notes.map((n, i) => (<div key={i} className="flag">{n}</div>))}
                  </div>
                )}
              </div>
            </>
          )}
        </section>
      </div>
    </div>
  );
}

const css = `
@import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter+Tight:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
